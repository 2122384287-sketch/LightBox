name: Build LightBox APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        id: build_apk
        continue-on-error: true
        run: |
          set +e
          ./gradlew --no-daemon assembleDebug > build.log 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Upload APK
        if: steps.build_apk.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Error Log
        if: steps.build_apk.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: build.log
          retention-days: 7

      - name: Quick Error Analysis
        if: steps.build_apk.outputs.exit_code != '0'
        run: |
          echo "==================== 错误分析 ===================="
          echo ">>> Kotlin 编译错误 (e: 开头)"
          grep -n "e:" build.log || echo "无"
          echo ""
          echo ">>> 致命错误 (FAILURE/Error)"
          grep -n -E "FAILURE|Error:" build.log || echo "无"
          echo ""
          echo ">>> 堆栈追踪 (前 30 行)"
          grep -A 30 "FAILURE" build.log | head -30 || true
          echo "=================================================="

      - name: Fail workflow when build failed
        if: steps.build_apk.outputs.exit_code != '0'
        run: exit 1
