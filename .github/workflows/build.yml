name: Build LightBox APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: List files (debug)
        run: ls -la

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          set +e
          ./gradlew --no-daemon assembleDebug > build.log 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Upload APK (build succeeded)
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload error log (build failed)
        if: steps.build.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: build.log
          retention-days: 7

      - name: Error analysis
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "==================== 错误分析 ===================="
          cat build.log
          echo -e "\n--- 关键错误信息 ---"
          grep -n -E "FAILURE|Error:|Exception" build.log || echo "未找到明确错误标记"
          echo "=================================================="

      - name: Fail workflow if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
