name: Build LightBox APK
on:workflow_dispatch
jobs:
  build:
    runs-on:ubuntu-latest
    permissions:{contents:read}
    steps:
      - uses:actions/checkout@v4
      - uses:actions/setup-java@v4
        with:{java-version:'17',distribution:temurin,cache:gradle}
      - uses:android-actions/setup-android@v3
      - run:sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
      - run:chmod +x gradlew
      - name:Build
        id:build
        continue-on-error:true
        run:set +e;./gradlew --no-daemon assembleDebug assembleRelease>build.log 2>&1;echo exit_code=$?>>$GITHUB_OUTPUT
      - uses:actions/upload-artifact@v4
        if:steps.build.outputs.exit_code=='0'
        with:{name:apk-out,path:app/build/outputs/apk/**/*.apk,retention-days:30}
      - uses:actions/upload-artifact@v4
        if:steps.build.outputs.exit_code!='0'
        with:{name:err-log,path:build.log,retention-days:7}
      - run:grep -E "e:|FAILURE" build.log||true
      - if:steps.build.outputs.exit_code!='0';run:exit 1
